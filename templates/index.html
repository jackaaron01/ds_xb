<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>高考喜报自动生成系统 v3</title>
<style>
:root{
  --bg:#0d1117;--text:#e6edf3;--panel:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.07);--input-bg:rgba(255,255,255,0.04);
  --input-border:rgba(255,255,255,0.1);--muted:#8b949e;--gold:#d4af37;
  --card:rgba(255,255,255,0.02);--card-border:rgba(255,255,255,0.06);
  --modal-bg:#161b22;--ph-color:#484f58;--tag-bg:rgba(255,255,255,0.02);
  --tag-border:rgba(255,255,255,0.08);--red:#da3633;--green:#238636;
  --body-bg:linear-gradient(160deg,#0d1117,#161b22 40%,#0d1117);
}
[data-theme="light"]{--bg:#f5f5f5;--text:#333;--panel:rgba(0,0,0,0.02);--border:rgba(0,0,0,0.08);--input-bg:#fff;--input-border:#ccc;--muted:#888;--card:rgba(0,0,0,0.01);--card-border:rgba(0,0,0,0.06);--modal-bg:#fff;--ph-color:#aaa;--tag-bg:rgba(0,0,0,0.03);--tag-border:rgba(0,0,0,0.1);--body-bg:#f0f2f5}
[data-theme="blue"]{--bg:#eef4fb;--text:#2c3e50;--panel:rgba(0,0,0,0.02);--border:rgba(66,133,244,0.15);--input-bg:#fff;--input-border:#c8daf8;--muted:#6b8299;--gold:#4285f4;--card:rgba(66,133,244,0.03);--card-border:rgba(66,133,244,0.1);--modal-bg:#fff;--ph-color:#a0b8d0;--tag-bg:rgba(66,133,244,0.05);--tag-border:rgba(66,133,244,0.15);--body-bg:#e8eff8}
[data-theme="pink"]{--bg:#fef5f7;--text:#4a3040;--panel:rgba(0,0,0,0.02);--border:rgba(233,150,170,0.2);--input-bg:#fff;--input-border:#f0c8d8;--muted:#a08090;--gold:#e87890;--card:rgba(233,150,170,0.04);--card-border:rgba(233,150,170,0.12);--modal-bg:#fff;--ph-color:#c8a0b0;--tag-bg:rgba(233,150,170,0.06);--tag-border:rgba(233,150,170,0.15);--body-bg:#fdf0f3}
[data-theme="sunset"]{--bg:#fff8f0;--text:#4a3a2a;--panel:rgba(0,0,0,0.02);--border:rgba(240,160,80,0.2);--input-bg:#fff;--input-border:#f0c898;--muted:#a09078;--gold:#e89850;--card:rgba(240,160,80,0.04);--card-border:rgba(240,160,80,0.12);--modal-bg:#fff;--ph-color:#c8a880;--tag-bg:rgba(240,160,80,0.06);--tag-border:rgba(240,160,80,0.15);--body-bg:#fef5ec}
[data-theme="minimal"]{--bg:#ffffff;--text:#1a1a1a;--panel:rgba(0,0,0,0.01);--border:rgba(0,0,0,0.06);--input-bg:#fafafa;--input-border:#e0e0e0;--muted:#999;--card:rgba(0,0,0,0.01);--card-border:rgba(0,0,0,0.04);--modal-bg:#fff;--ph-color:#bbb;--tag-bg:#f5f5f5;--tag-border:rgba(0,0,0,0.06);--body-bg:#ffffff}
[data-theme="warm"]{--bg:#1a1410;--text:#e8dcc8;--panel:rgba(255,255,255,0.03);--border:rgba(200,160,100,0.15);--input-bg:rgba(255,255,255,0.04);--input-border:rgba(200,160,100,0.2);--muted:#a09080;--gold:#e8b860;--card:rgba(255,255,255,0.02);--card-border:rgba(200,160,100,0.1);--modal-bg:#1a1510;--ph-color:#6a5a4a;--tag-bg:rgba(255,255,255,0.02);--tag-border:rgba(200,160,100,0.12);--body-bg:linear-gradient(160deg,#1a1410,#241e18 40%,#1a1410)}
[data-theme="forest"]{--bg:#0d1612;--text:#c8dcc8;--panel:rgba(255,255,255,0.03);--border:rgba(100,180,100,0.15);--input-bg:rgba(255,255,255,0.04);--input-border:rgba(100,180,100,0.2);--muted:#809880;--gold:#88d488;--card:rgba(255,255,255,0.02);--card-border:rgba(100,180,100,0.1);--modal-bg:#101a14;--ph-color:#4a6a4a;--tag-bg:rgba(255,255,255,0.02);--tag-border:rgba(100,180,100,0.12);--body-bg:linear-gradient(160deg,#0d1612,#152218 40%,#0d1612)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","微软雅黑",sans-serif;background:var(--body-bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .4s,color .3s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.header{background:var(--panel);border-bottom:1px solid rgba(212,175,55,0.2);padding:14px 20px;text-align:center;position:relative}
.header h1{font-size:22px;color:var(--gold);letter-spacing:2px}
.header .ip{font-size:11px;color:#555;margin-top:2px}
.header .theme-btn{position:absolute;right:20px;top:50%;transform:translateY(-50%);padding:5px 12px;border:1px solid var(--border);border-radius:14px;background:var(--tag-bg);color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
.header .theme-btn:hover{border-color:var(--gold);color:var(--gold)}
.container{max-width:1300px;margin:12px auto;display:flex;gap:12px;padding:0 14px;flex-wrap:wrap}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;flex:1;min-width:340px;transition:border-color .3s}
.panel-right{flex:1.5;display:flex;flex-direction:column}
.panel-left{max-width:440px}
.sec-title{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(212,175,55,0.12);display:flex;align-items:center;gap:6px}
.box-card{background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:10px;margin-bottom:8px;transition:border-color .2s,box-shadow .2s,background .2s}
.box-card:hover{border-color:var(--input-border);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.box-card.active{border-color:rgba(212,175,55,0.5);background:rgba(212,175,55,0.06);box-shadow:0 0 8px rgba(212,175,55,0.08)}
.box-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.box-header input{flex:1;padding:6px 8px;border:1px solid var(--input-border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:12px;outline:none}
.box-header input:focus{border-color:var(--gold)}
.box-delete{padding:3px 8px;border:1px solid rgba(218,54,51,0.3);border-radius:4px;background:transparent;color:var(--red);font-size:11px;cursor:pointer}
.box-delete:hover{background:rgba(218,54,51,0.1)}
.box-row{display:flex;gap:6px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
.box-row .lbl{font-size:10px;color:var(--muted);min-width:24px}
.box-row input[type="text"],.box-row input[type="number"]{padding:4px 5px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:12px;outline:none}
.box-row input[type="text"]{flex:1;min-width:80px;padding:5px 7px}
.box-row input[type="number"]{width:55px;text-align:center}
.box-row input:focus{border-color:var(--gold)}
.box-row input[type="color"]{width:26px;height:26px;border:none;padding:0;cursor:pointer;border-radius:4px;background:transparent}
.box-select{padding:3px 8px;border:1px solid var(--input-border);border-radius:4px;background:var(--tag-bg);color:var(--muted);font-size:11px;cursor:pointer}
.box-select.on{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,0.08)}
.box-font{font-size:10px;max-width:180px;padding:3px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);outline:none}
.box-font:focus{border-color:var(--gold)}
.btn{padding:8px 16px;border:none;border-radius:7px;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8860b);color:#fff;font-size:14px;padding:10px 24px}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 3px 14px rgba(212,175,55,0.25)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#2ea043}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-outline:hover{background:rgba(255,255,255,0.06);color:var(--text);border-color:var(--muted)}
.btn-red{background:rgba(218,54,51,0.8);color:#fff}.btn-red:hover{background:#da3633}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.preview-wrap{flex:1;display:flex;flex-direction:column}
.preview-box{flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);border-radius:8px;border:1px dashed var(--border);min-height:320px;position:relative;overflow:hidden;cursor:crosshair;transition:border-color .3s}
.preview-box:hover{border-color:rgba(212,175,55,0.25)}
.preview-box img{max-width:100%;max-height:70vh;border-radius:4px;transition:opacity .15s}
.preview-placeholder{color:var(--ph-color);font-size:13px;transition:opacity .2s}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.tag-row>span{font-size:11px;color:var(--muted)}
.tag{padding:3px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--tag-border);background:var(--tag-bg);color:var(--muted);transition:all .12s;user-select:none;white-space:nowrap}
.tag:hover{border-color:rgba(255,255,255,0.2)}
.tag.on{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,0.08)}
.cstrip{display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 0;flex-wrap:wrap}
.cstrip .lbl{font-size:10px;color:var(--muted)}
.step-group{display:flex;align-items:center}
.step-group .step-btn{padding:4px 7px;border:1px solid var(--border);background:var(--tag-bg);color:var(--muted);font-size:12px;cursor:pointer;user-select:none;transition:all .1s}
.step-group .step-btn:hover{background:rgba(212,175,55,0.12);border-color:var(--gold);color:var(--gold)}
.step-group .step-btn:active{background:rgba(212,175,55,0.2);transform:scale(.95)}
.step-group .step-btn:first-child{border-radius:4px 0 0 4px}
.step-group .step-btn:last-child{border-radius:0 4px 4px 0}
.step-group input{width:50px;padding:4px;text-align:center;border:1px solid var(--border);border-left:none;border-right:none;background:var(--input-bg);color:var(--text);font-size:12px;outline:none;font-family:inherit}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.form-row input,.form-row select{width:100%;padding:7px 10px;border:1px solid var(--input-border);border-radius:6px;background:var(--input-bg);color:var(--text);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,0.08)}
.form-row select option{background:var(--modal-bg);color:var(--text)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-10px);padding:8px 18px;border-radius:7px;font-size:13px;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;background:var(--green);color:#fff;box-shadow:0 3px 12px rgba(0,0,0,0.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.error{background:var(--red)}.toast.warn{background:#d29922}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--modal-bg);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:520px;width:92%;max-height:85vh;overflow-y:auto;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{color:var(--gold);margin-bottom:12px;font-size:15px}
.sep{border:none;border-top:1px solid var(--border);margin:12px 0}
@media(max-width:768px){.container{flex-direction:column}.panel-left{max-width:100%}}
</style>
</head>
<body>
<div class="header"><h1>🎓 高考喜报自动生成系统 v3</h1><button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 深色</button><br><div class="ip" id="ipDisplay">获取中...</div></div>
<div class="container">
<div class="panel panel-left">
<div class="sec-title">📝 文本框 <button class="btn btn-green" onclick="addTextBox()" style="margin-left:auto;padding:3px 12px;font-size:11px">+ 添加</button><button class="btn btn-outline" onclick="refreshFontList()" style="padding:3px 8px;font-size:10px" title="刷新字体列表">⟳</button></div>
<div id="boxesContainer"></div>
<hr class="sep">
<div class="form-row"><label>输出尺寸</label><select id="outputSize" onchange="saveAll()"><option value="original">原始尺寸</option><option value="1080x1440">朋友圈(1080×1440)</option><option value="900x383">公众号封面(900×383)</option><option value="2480x3508">A4打印(2480×3508)</option></select></div>
<div class="form-row"><label>输出格式</label><select id="outputFormat" onchange="saveAll()"><option value="png">PNG</option><option value="jpg">JPG</option></select></div>
<div class="form-row"><input type="file" id="bgUpload" accept="image/*" onchange="onBgUpload()"></div>
<div id="bgInfo" style="font-size:10px;color:#8b949e;margin-bottom:6px"></div>
<div class="btn-row"><button class="btn btn-gold" onclick="doGenerate()">🎉 生成喜报</button><button class="btn btn-green" onclick="showBatchModal()">📋 批量</button><button class="btn btn-outline" onclick="resetConfig()" style="font-size:11px;padding:6px 10px">↺ 重置</button></div>
</div>
<div class="panel panel-right">
<div class="sec-title">👁️ 预览</div>
<div class="tag-row" id="activeTagRow"><span>定位:</span></div>
<div class="preview-wrap"><div class="preview-box" id="previewArea" onclick="onPreviewClick(event)"><div class="preview-placeholder" id="previewPlaceholder">正在加载预览...</div><img id="previewImg" style="display:none" alt="预览"></div></div>
<div id="bgSizeInfo" style="font-size:10px;color:#8b949e;text-align:center;margin-top:3px"></div>
<div class="cstrip" style="margin-top:6px"><span class="lbl" id="coordLabel">选中文本框</span><span class="lbl">X</span><span class="step-group"><span class="step-btn" onclick="stepCoord('x',-1)">−</span><input type="number" id="coordX" value="350" onchange="onCoordInput()"><span class="step-btn" onclick="stepCoord('x',1)">+</span></span><span class="lbl">Y</span><span class="step-group"><span class="step-btn" onclick="stepCoord('y',-1)">−</span><input type="number" id="coordY" value="600" onchange="onCoordInput()"><span class="step-btn" onclick="stepCoord('y',1)">+</span></span></div>
<div class="cstrip"><span class="lbl">字号</span><span class="step-group"><span class="step-btn" onclick="stepSize(-1)">−</span><input type="number" id="coordSize" value="80" onchange="onSizeInput()"><span class="step-btn" onclick="stepSize(1)">+</span></span></div>
<div class="btn-row" style="justify-content:center;margin-top:6px"><button class="btn btn-outline" onclick="refreshPreview()">🔄 刷新</button><button class="btn btn-outline" onclick="loadFileList()">📋 已生成</button><button class="btn btn-outline" onclick="openOutput()">📂 目录</button><span style="font-size:9px;color:#484f58">方向键±1 | Shift±10</span></div>
<div id="fileList" style="display:none;margin-top:6px;max-height:120px;overflow-y:auto;font-size:10px"><div style="color:#d4af37;margin-bottom:3px">📁 最近生成（点击下载）</div><div id="fileListContent"></div></div>
</div>
</div>
<div class="modal-overlay" id="batchModal"><div class="modal"><h3>📋 批量生成 (Excel)</h3><p style="font-size:11px;color:#8b949e;margin-bottom:10px">第一行为表头(与文本框标签匹配)，从第二行读取</p><div class="form-row"><input type="file" id="excelFile" accept=".xlsx,.xls"></div><div id="batchProgress" style="display:none;margin:10px 0;font-size:12px;color:#d4af37"></div><div id="batchResult" style="display:none"></div><div class="btn-row" style="justify-content:flex-end;margin-top:4px"><button class="btn btn-red" onclick="closeBatchModal()">关闭</button><button class="btn btn-gold" onclick="doBatch()" style="padding:8px 20px">开始生成</button></div></div></div>
<div class="modal-overlay" id="resultModal"><div class="modal" style="text-align:center;max-width:600px"><h3>✅ 生成成功</h3><img id="resultImg" style="max-width:100%;max-height:55vh;border-radius:8px;margin-bottom:10px;box-shadow:0 3px 16px rgba(0,0,0,0.5)"><div id="resultFilename" style="font-size:11px;color:#8b949e;margin-bottom:10px"></div><div class="btn-row" style="justify-content:center"><button class="btn btn-gold" onclick="downloadLast()">💾 下载</button><button class="btn btn-red" onclick="closeResultModal()">关闭</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
var activeId=1,origW=1055,lastFile='',previewTimer=null;

function $(id){return document.getElementById(id)}
function qsa(e,s){return e.querySelectorAll(s)}
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function r2h(r){return'#'+r[0].toString(16).padStart(2,'0')+r[1].toString(16).padStart(2,'0')+r[2].toString(16).padStart(2,'0')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m,c){var t=$('toast');t.textContent=m;t.className='toast '+(c||'')+' show';setTimeout(function(){t.className='toast'},2500)}

// 文本框读写
function readBoxes(){
  var cards=qsa($('boxesContainer'),'.box-card'),boxes=[];
  cards.forEach(function(card){
    var bid=parseInt(card.id.replace('boxCard_','')),label=card.querySelector('.box-header input').value;
    var text=card.querySelector('.box-row input[type="text"]').value,nums=qsa(card,'.box-row input[type="number"]');
    var ci=card.querySelector('.box-row input[type="color"]'),fs=card.querySelector('.box-font');
    boxes.push({id:bid,label:label,text:text,x:+nums[0].value,y:+nums[1].value,size:+nums[2].value,color:h2r(ci.value),stroke:+nums[3].value,font_path:fs?fs.value:''});
  });
  return boxes;
}
function writeBoxUI(b){var card=$('boxCard_'+b.id);if(!card)return;var ns=qsa(card,'.box-row input[type="number"]');ns[0].value=b.x;ns[1].value=b.y;ns[2].value=b.size;ns[3].value=b.stroke||0}

// 文本框渲染
function renderBoxes(boxes){
  if(!boxes||!boxes.length)boxes=[{id:1,label:'文本框1',text:'',x:350,y:600,size:60,color:[180,0,0],stroke:0,font_path:''}];
  var c=$('boxesContainer'),tr=$('activeTagRow');if(!c||!tr)return;
  c.innerHTML='';tr.innerHTML='<span>定位:</span>';
  boxes.forEach(function(b){
    var hex=r2h(b.color||[180,0,0]),card=document.createElement('div');
    card.className='box-card'+(b.id===activeId?' active':'');card.id='boxCard_'+b.id;
    card.innerHTML='<div class="box-header"><input type="text" value="'+esc(b.label)+'" placeholder="标签名" onchange="onBoxChange('+b.id+')"><button class="box-delete" onclick="delBox('+b.id+')">×</button></div>'
      +'<div class="box-row"><span class="lbl">文字</span><input type="text" value="'+esc(b.text)+'" placeholder="输入内容" onchange="onBoxChange('+b.id+')"></div>'
      +'<div class="box-row"><span class="lbl">X</span><input type="number" value="'+(b.x||0)+'" onchange="onBoxChange('+b.id+')"><span class="lbl">Y</span><input type="number" value="'+(b.y||0)+'" onchange="onBoxChange('+b.id+')"><span class="lbl">大小</span><input type="number" value="'+(b.size||60)+'" onchange="onBoxChange('+b.id+')" style="width:45px"><span class="lbl">描边</span><input type="number" value="'+(b.stroke||0)+'" onchange="onBoxChange('+b.id+')" min="0" max="6" style="width:40px"><input type="color" value="'+hex+'" onchange="onBoxChange('+b.id+')"><button class="box-select'+(b.id===activeId?' on':'')+'" onclick="setActive('+b.id+')">定位</button></div>'
      +'<div class="box-row"><span class="lbl">字体</span><select onchange="onBoxChange('+b.id+')" class="box-font" data-bid="'+b.id+'" data-font="'+esc(b.font_path||'')+'"><option value="">(使用全局)</option></select></div>';
    c.appendChild(card);
    var tag=document.createElement('span');tag.className='tag'+(b.id===activeId?' on':'');tag.textContent=b.label||'框'+b.id;
    tag.onclick=(function(i){return function(){setActive(i)}})(b.id);tr.appendChild(tag);
  });
}
function onBoxChange(id){saveAll();clearTimeout(previewTimer);previewTimer=setTimeout(refreshPreview,150)}
function addTextBox(){
  var boxes=readBoxes(),maxId=boxes.reduce(function(m,b){return Math.max(m,b.id)},0)+1;
  boxes.push({id:maxId,label:'文本框'+maxId,text:'',x:400,y:500,size:50,color:[180,0,0],stroke:0,font_path:''});
  activeId=maxId;renderBoxes(boxes);saveAll(boxes);refreshPreview();populateBoxFonts();
}
function delBox(id){
  var boxes=readBoxes();if(boxes.length<=1){toast('至少保留一个文本框','warn');return}
  boxes=boxes.filter(function(b){return b.id!==id});if(activeId===id)activeId=boxes[0].id;
  renderBoxes(boxes);saveAll(boxes);refreshPreview();populateBoxFonts();
}

// 定位
function setActive(id){activeId=id;qsa(document,'.box-card').forEach(function(c){c.classList.remove('active')});var card=$('boxCard_'+id);if(card)card.classList.add('active');qsa(document,'.tag').forEach(function(t){t.classList.remove('on')});qsa(document,'.box-select').forEach(function(b){b.classList.remove('on')});var sb=card?card.querySelector('.box-select'):null;if(sb)sb.classList.add('on');syncCoord();refreshPreview()}
function syncCoord(){var box=readBoxes().filter(function(b){return b.id===activeId})[0];if(!box)return;$('coordX').value=box.x;$('coordY').value=box.y;$('coordSize').value=box.size;$('coordLabel').textContent=box.label||'文本框'}

// 服务端预览（单图替换，原子无闪烁）
function refreshPreview(){
  var boxes=readBoxes(),params=boxes.filter(function(b){return b.text&&b.text.trim()}).map(function(b){return't'+b.id+'='+encodeURIComponent(b.text)}).join('&');
  var url='/api/preview?active='+activeId+(params?'&'+params:'')+'&_='+Date.now();
  var img=$('previewImg'),ph=$('previewPlaceholder');
  var loader=new Image();
  loader.onload=function(){img.src=loader.src;img.style.display='block';ph.style.display='none'};
  loader.onerror=function(){img.style.display='none';ph.style.display='block';ph.innerHTML='⚠ 加载失败'};
  loader.src=url;
}
function onPreviewClick(e){
  var img=$('previewImg');if(!img||img.style.display==='none')return;
  var rect=img.getBoundingClientRect(),scale=origW/img.offsetWidth;
  var rx=Math.round((e.clientX-rect.left)*scale),ry=Math.round((e.clientY-rect.top)*scale);
  $('coordX').value=rx;$('coordY').value=ry;onCoordInput();toast('已定位→('+rx+','+ry+')');
}

// 微调
function stepCoord(a,d){var el=$('coord'+(a||'x').toUpperCase());el.value=Math.max(0,+el.value+d);onCoordInput()}
function stepSize(d){var el=$('coordSize');el.value=Math.max(6,+el.value+d);onSizeInput()}
function onCoordInput(){applyCoord('coord',['x','y'])}
function onSizeInput(){applyCoord('size')}
function applyCoord(type,props){
  var box=readBoxes().filter(function(b){return b.id===activeId})[0];if(!box)return;
  if(type==='coord'){box.x=+$('coordX').value;box.y=+$('coordY').value}
  else{box.size=+$('coordSize').value}
  writeBoxUI(box);saveAll();clearTimeout(previewTimer);previewTimer=setTimeout(refreshPreview,150);
}

// 配置
function saveAll(boxes){var b=boxes||readBoxes();fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text_boxes:b,output_size:$('outputSize').value,output_format:$('outputFormat').value})})}
function loadConfig(){return fetch('/api/config').then(function(r){return r.json()}).then(function(cfg){$('outputSize').value=cfg.output_size||'original';$('outputFormat').value=cfg.output_format||'png';if(cfg.bg_exists){loadBgInfo()}else{var bi=$('bgInfo');if(bi)bi.textContent='⚠ 请上传背景图'}renderBoxes(cfg.text_boxes||[]);populateBoxFonts();refreshPreview()}).catch(function(e){console.error(e)})}
function resetConfig(){if(!confirm('确定恢复默认配置？'))return;fetch('/api/config/reset',{method:'POST'}).then(function(){loadConfig().then(function(){refreshPreview()})})}

// 字体
var _fontsCache=null;
function populateBoxFonts(cb){var opts;_loadOrFetch(function(fonts){opts=fonts.map(function(f){return'<option value="'+f.path+'">'+f.name+'</option>'}).join('');qsa(document,'.box-font').forEach(function(s){var cv=s.value||s.dataset.font;s.innerHTML='<option value="">(使用全局)</option>'+opts;if(cv){s.value=cv;if(s.selectedIndex<0)s.value=''}});if(cb)cb()})}
function _loadOrFetch(cb){if(_fontsCache){cb(_fontsCache);return}fetch('/api/fonts').then(function(r){return r.json()}).then(function(f){_fontsCache=f;cb(f)}).catch(function(){})}
function refreshFontList(){_fontsCache=null;populateBoxFonts(function(){toast('字体列表已刷新')})}
// 背景
function loadBgInfo(){fetch('/api/bg_info').then(function(r){return r.json()}).then(function(d){if(d.width){origW=d.width;$('bgInfo').textContent='✅ '+d.filename+' ('+d.width+'×'+d.height+')';$('bgSizeInfo').textContent='原始尺寸: '+d.width+'×'+d.height}refreshPreview()}).catch(function(){refreshPreview()})}
function onBgUpload(){var f=$('bgUpload').files[0];if(!f)return;var fd=new FormData();fd.append('file',f);toast('上传中...','warn');fetch('/api/upload_bg',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){if(d.success){toast('背景已更新');loadBgInfo();saveAll()}else toast(d.error||'失败','error')}).catch(function(){toast('上传失败','error')})}

// 生成
function doGenerate(){var boxes=readBoxes();if(!boxes.some(function(b){return b.text.trim()})){toast('请填写文本框','error');return}toast('生成中...','warn');fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text_boxes:readBoxes()})}).then(function(r){return r.json()}).then(function(d){if(d.success){lastFile=d.filename;$('resultImg').src='/api/preview_image/'+encodeURIComponent(d.filename)+'?_='+Date.now();$('resultFilename').textContent=d.filename;$('resultModal').classList.add('show');toast('✅ '+d.filename)}else toast(d.error||'失败','error')}).catch(function(){toast('请求失败','error')})}
function downloadLast(){if(lastFile){var a=document.createElement('a');a.href='/api/download/'+lastFile;a.download=lastFile;a.click()}}
function closeResultModal(){$('resultModal').classList.remove('show')}
function showBatchModal(){$('batchModal').classList.add('show')}
function closeBatchModal(){$('batchModal').classList.remove('show')}
function doBatch(){var f=$('excelFile').files[0];if(!f){toast('请选择Excel','error');return}saveAll();$('batchProgress').style.display='block';$('batchProgress').textContent='正在生成...';$('batchResult').style.display='none';var fd=new FormData();fd.append('file',f);fetch('/api/batch',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){$('batchProgress').style.display='none';if(d.error){$('batchResult').innerHTML='<div style="color:#da3633">'+d.error+'</div>';$('batchResult').style.display='block';toast(d.error,'error');return}var h='<div style="font-size:12px"><b>完成!</b> '+d.total+'条, 成功'+d.success+'条';if(d.results){h+='<div style="max-height:180px;overflow-y:auto;margin-top:4px">';d.results.forEach(function(r){h+='<div style="font-size:10px;padding:2px 0">'+(r.success?'✅':'❌')+' '+r.name+(r.filename?' → '+r.filename:'')+'</div>'});h+='</div>'}h+='</div>';$('batchResult').innerHTML=h;$('batchResult').style.display='block';toast('批量完成!')}).catch(function(){$('batchProgress').style.display='none';toast('请求失败','error')})}
function loadFileList(){var l=$('fileList');if(l.style.display==='block'){l.style.display='none';return}l.style.display='block';$('fileListContent').innerHTML='<span style="color:#8b949e">加载中...</span>';fetch('/api/files').then(function(r){return r.json()}).then(function(files){if(!files.length){$('fileListContent').innerHTML='<span style="color:#8b949e">暂无</span>';return}$('fileListContent').innerHTML=files.map(function(f){return'<div style="padding:2px 0;display:flex;justify-content:space-between"><a href="/api/download/'+encodeURIComponent(f.name)+'" download>'+f.name+'</a><span style="color:#555">'+f.time+'</span></div>'}).join('')}).catch(function(){$('fileListContent').innerHTML='<span style="color:#e74c3c">失败</span>'})}
function openOutput(){window.open('/output','_blank')}

// 键盘
document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;switch(e.key){case'ArrowLeft':stepCoord('x',e.shiftKey?-10:-1);e.preventDefault();break;case'ArrowRight':stepCoord('x',e.shiftKey?10:1);e.preventDefault();break;case'ArrowUp':stepCoord('y',e.shiftKey?-10:-1);e.preventDefault();break;case'ArrowDown':stepCoord('y',e.shiftKey?10:1);e.preventDefault();break}});
document.addEventListener('dragover',function(e){e.preventDefault()});
document.addEventListener('drop',function(e){e.preventDefault();var f=e.dataTransfer.files[0];if(!f)return;var ext=f.name.split('.').pop().toLowerCase();if(ext==='xlsx'||ext==='xls'){$('excelFile').files=e.dataTransfer.files;showBatchModal();toast('已识别Excel')}else if(['jpg','jpeg','png','bmp'].indexOf(ext)>=0){$('bgUpload').files=e.dataTransfer.files;onBgUpload()}});

// 主题
var THEMES=['dark','light','blue','pink','sunset','minimal','warm','forest'],THEME_LABELS={dark:'🌙 深色',light:'☀ 浅色',blue:'💧 蓝调',pink:'🌸 樱粉',sunset:'🌅 日落',minimal:'⬜ 极简',warm:'🔥 暖色',forest:'🌿 墨绿'};
(function(){var t=localStorage.getItem('theme')||'dark';if(THEMES.indexOf(t)<0)t='dark';document.documentElement.setAttribute('data-theme',t);$('themeBtn').textContent=THEME_LABELS[t]})();
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme'),n=THEMES[(THEMES.indexOf(c)+1)%THEMES.length];document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);$('themeBtn').textContent=THEME_LABELS[n]}

// 初始化
fetch('/api/getip').then(function(r){return r.json()}).then(function(d){$('ipDisplay').textContent='🌐 http://127.0.0.1:5000'+(d.ip!=='127.0.0.1'?'  |  局域网: http://'+d.ip+':5000':'')}).catch(function(){});
loadConfig();
</script>
</body>
</html>
